name: Trigger All Services

on:
  workflow_dispatch:

jobs:
  trigger-all:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Node App
        run: |
          curl -X POST https://api.github.com/repos/itzownway/simple-node-azure/dispatches \
          -H "Authorization: Bearer ${{ secrets.REPO2_PAT }}" \
          -d '{"event_type": "trigger-deploy"}'